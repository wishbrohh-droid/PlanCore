<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hill Climb Racer</title>
<style>
  /* ===== GLOBAL RESET & BASE STYLES ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
  }

  /* ===== CANVAS WRAPPER ===== */
  #gameWrapper {
    position: relative;
    width: 900px;
    height: 500px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(80, 200, 255, 0.15);
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ===== HUD OVERLAY ===== */
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
  }

  .hud-panel {
    background: rgba(10, 10, 30, 0.7);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 8px 14px;
    min-width: 120px;
  }

  .hud-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 2px;
  }

  .hud-value {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .hud-value span {
    font-size: 12px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    margin-left: 2px;
  }

  /* ===== FUEL BAR ===== */
  #fuelContainer {
    width: 180px;
  }

  #fuelBarOuter {
    background: rgba(255,255,255,0.1);
    border-radius: 6px;
    height: 10px;
    overflow: hidden;
    margin-top: 6px;
  }

  #fuelBar {
    height: 100%;
    border-radius: 6px;
    background: linear-gradient(90deg, #f7971e, #ffd200);
    transition: width 0.2s ease, background 0.3s ease;
  }

  /* ===== SCORE PANEL ===== */
  #scorePanel { text-align: right; }

  /* ===== COIN INDICATOR ===== */
  #coinDisplay {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .coin-icon {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ffd200, #f7971e);
    display: inline-block;
    flex-shrink: 0;
  }

  /* ===== GAME OVER SCREEN ===== */
  #gameOver {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(5, 5, 20, 0.92);
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    gap: 0;
  }

  #gameOver.visible { display: flex; }

  .go-title {
    font-size: 52px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 6px;
  }

  .go-subtitle {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 36px;
  }

  .go-stats {
    display: flex;
    gap: 24px;
    margin-bottom: 40px;
  }

  .go-stat {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 16px 28px;
  }

  .go-stat-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    margin-bottom: 6px;
  }

  .go-stat-value {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
  }

  .go-stat-value.gold { color: #ffd200; }

  #restartBtn {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    border: none;
    border-radius: 50px;
    padding: 14px 48px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    color: #0a0a1a;
    cursor: pointer;
    text-transform: uppercase;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }

  #restartBtn:hover { transform: scale(1.05); opacity: 0.9; }
  #restartBtn:active { transform: scale(0.97); }

  .go-hint {
    margin-top: 14px;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
  }

  /* ===== CONTROLS HINT ===== */
  #controlsHint {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 16px;
    pointer-events: none;
    opacity: 0.45;
  }

  .ctrl-key {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    color: #fff;
    letter-spacing: 0.5px;
  }

  /* ===== SPEED INDICATOR ===== */
  #speedometer {
    position: absolute;
    bottom: 14px;
    right: 20px;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="gameWrapper">
  <!-- Main Game Canvas -->
  <canvas id="gameCanvas" width="900" height="500"></canvas>

  <!-- HUD (Heads-Up Display) -->
  <div id="hud">
    <!-- Fuel Bar -->
    <div class="hud-panel" id="fuelContainer">
      <div class="hud-label">Fuel</div>
      <div id="fuelBarOuter">
        <div id="fuelBar" style="width:100%"></div>
      </div>
    </div>

    <!-- Distance Score -->
    <div class="hud-panel" style="text-align:center;">
      <div class="hud-label">Distance</div>
      <div class="hud-value" id="distDisplay">0 <span>m</span></div>
    </div>

    <!-- Coins -->
    <div class="hud-panel" id="scorePanel">
      <div class="hud-label">Coins</div>
      <div class="hud-value" id="coinDisplay">
        <span class="coin-icon"></span>
        <span id="coinCount">0</span>
      </div>
    </div>
  </div>

  <!-- Game Over Overlay -->
  <div id="gameOver">
    <div class="go-title">GAME OVER</div>
    <div class="go-subtitle">You ran out of fuel</div>
    <div class="go-stats">
      <div class="go-stat">
        <div class="go-stat-label">Distance</div>
        <div class="go-stat-value" id="finalDist">0 m</div>
      </div>
      <div class="go-stat">
        <div class="go-stat-label">Coins</div>
        <div class="go-stat-value gold" id="finalCoins">0</div>
      </div>
    </div>
    <button id="restartBtn" onclick="restartGame()">Play Again</button>
    <div class="go-hint">or press Space</div>
  </div>

  <!-- Controls Hint -->
  <div id="controlsHint">
    <div class="ctrl-key">← Reverse</div>
    <div class="ctrl-key">→ Accelerate</div>
    <div class="ctrl-key">Space Restart</div>
  </div>
</div>

<script>
// =============================================================
//  HILL CLIMB RACER — Complete Game Engine
//  Single-file HTML5 Canvas game, no external dependencies
// =============================================================

// ---- Canvas Setup ----
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const W = canvas.width;   // 900
const H = canvas.height;  // 500

// ---- HUD Elements ----
const fuelBar    = document.getElementById('fuelBar');
const distDisplay = document.getElementById('distDisplay');
const coinCount  = document.getElementById('coinCount');
const gameOverEl = document.getElementById('gameOver');
const finalDist  = document.getElementById('finalDist');
const finalCoins = document.getElementById('finalCoins');

// =============================================================
//  TERRAIN GENERATION
//  Uses midpoint displacement + smoothing for natural hills
// =============================================================

const TERRAIN_SEGMENT = 6;   // pixels per terrain point (smaller = smoother)
const TERRAIN_POINTS  = 600; // total terrain points to generate ahead

/**
 * Generate terrain Y-values using layered sine waves + noise.
 * Returns array of Y positions for each segment index.
 */
function generateTerrain(startX, count) {
  const points = [];
  for (let i = 0; i < count; i++) {
    const x = (startX + i) * TERRAIN_SEGMENT;

    // Layer multiple sine waves for organic hills
    let y = H * 0.55;
    y += Math.sin(x * 0.008) * 60;          // long rolling hills
    y += Math.sin(x * 0.022 + 1.5) * 35;   // medium bumps
    y += Math.sin(x * 0.055 + 0.8) * 18;   // small texture
    y += Math.sin(x * 0.13  + 2.1) * 8;    // micro bumps
    y += (Math.random() - 0.5) * 5;         // tiny noise

    // Clamp so ground stays visible but hills are fun
    y = Math.max(H * 0.35, Math.min(H * 0.78, y));
    points.push(y);
  }

  // Smooth pass — average neighbours to remove sharp spikes
  for (let pass = 0; pass < 3; pass++) {
    for (let i = 1; i < points.length - 1; i++) {
      points[i] = (points[i - 1] + points[i] * 2 + points[i + 1]) / 4;
    }
  }
  return points;
}

// =============================================================
//  PHYSICS CONSTANTS
// =============================================================

const GRAVITY        = 0.45;   // downward acceleration
const ENGINE_POWER   = 0.38;   // forward force when accelerating
const BRAKE_POWER    = 0.22;   // braking/reverse force
const MAX_SPEED      = 9.5;    // max horizontal velocity
const FRICTION       = 0.97;   // ground friction multiplier
const AIR_FRICTION   = 0.995;  // air drag
const WHEEL_RADIUS   = 14;     // visual wheel size
const CAR_W          = 72;     // car body width
const CAR_H          = 28;     // car body height
const SUSPENSION_K   = 0.18;   // spring stiffness
const DAMPING        = 0.55;   // suspension damping
const FUEL_DRAIN     = 0.025;  // fuel drain per frame while driving

// =============================================================
//  COIN SYSTEM
// =============================================================

const COIN_RADIUS  = 11;
const COIN_SPACING = 240; // pixels between coins on average

// =============================================================
//  GAME STATE
// =============================================================

let game; // main game state object

/**
 * Build a fresh game state — call this to start or restart.
 */
function createGameState() {
  // Generate initial terrain
  const terrain = generateTerrain(0, TERRAIN_POINTS);

  // Find a flat-ish starting Y for the car
  const startY = terrain[10] - WHEEL_RADIUS * 2 - CAR_H;

  return {
    // ---- Scrolling ----
    cameraX: 0,         // how far the world has scrolled (pixels)
    terrainOffset: 0,   // which terrain segment is the leftmost visible

    // ---- Terrain ----
    terrain,            // array of Y values per segment
    terrainGenIndex: TERRAIN_POINTS, // where to generate next

    // ---- Car physics ----
    car: {
      x: 180,           // screen X (stays roughly here; world scrolls)
      y: startY,        // world Y position of car center
      vx: 0,            // horizontal velocity
      vy: 0,            // vertical velocity
      angle: 0,         // rotation in radians
      angularVel: 0,    // rotation speed

      // Suspension for each wheel (front/rear offset)
      susp: [
        { offset: 0, vel: 0 }, // rear wheel
        { offset: 0, vel: 0 }, // front wheel
      ],

      onGround: false,  // is car touching terrain?
      flipped: false,   // is car upside-down (game over condition)
    },

    // ---- Controls ----
    keys: {
      right: false,
      left: false,
    },

    // ---- Fuel ----
    fuel: 100,          // 0-100

    // ---- Score ----
    distance: 0,        // meters driven forward
    coins: 0,           // coins collected

    // ---- Coin objects ----
    coinList: [],       // { wx, wy, collected }

    // ---- State flags ----
    running: true,
    frameId: null,

    // ---- Visual ----
    particles: [],      // exhaust particles
    groundShakeTimer: 0,
  };
}

// =============================================================
//  TERRAIN HELPERS
// =============================================================

/**
 * Get terrain Y at a given world X pixel.
 * Interpolates between two terrain points for smoothness.
 */
function getTerrainY(g, worldX) {
  const idx = worldX / TERRAIN_SEGMENT - g.terrainOffset;
  const i   = Math.floor(idx);
  const t   = idx - i;

  if (i < 0) return H * 0.6;
  if (i >= g.terrain.length - 1) return g.terrain[g.terrain.length - 1];

  // Linear interpolation between adjacent points
  return g.terrain[i] * (1 - t) + g.terrain[i + 1] * t;
}

/**
 * Get terrain slope (angle) at a world X position.
 * Uses finite difference on terrain points.
 */
function getTerrainAngle(g, worldX) {
  const y1 = getTerrainY(g, worldX - 4);
  const y2 = getTerrainY(g, worldX + 4);
  return Math.atan2(y2 - y1, 8);
}

/**
 * Extend terrain when the car approaches the end of generated points.
 */
function extendTerrain(g) {
  const newPoints = generateTerrain(g.terrainGenIndex, 200);
  g.terrain.push(...newPoints);
  g.terrainGenIndex += 200;
}

// =============================================================
//  COIN GENERATION
// =============================================================

/**
 * Spawn coins ahead of the current camera position.
 */
function spawnCoins(g) {
  // World X of the rightmost coin
  const lastCoin = g.coinList.length > 0
    ? g.coinList[g.coinList.length - 1].wx
    : g.cameraX;

  // Spawn until we have coins ~1500px ahead
  while (lastCoin < g.cameraX + W + 1500 || g.coinList.length === 0) {
    const nextX = (g.coinList.length === 0 ? g.cameraX + 600 : g.coinList[g.coinList.length - 1].wx)
                  + COIN_SPACING + Math.random() * 160;
    const groundY = getTerrainY(g, nextX);
    g.coinList.push({
      wx: nextX,
      wy: groundY - 40 - Math.random() * 30,  // float above ground
      collected: false,
      bobPhase: Math.random() * Math.PI * 2,  // random bob offset
    });
  }
}

// =============================================================
//  PHYSICS UPDATE
// =============================================================

/**
 * Main physics step — called every frame.
 * Updates car position, velocity, rotation, suspension, collision.
 */
function updatePhysics(g, dt) {
  const car = g.car;

  // ---- Engine / Braking Input ----
  let engineOn = false;
  if (g.keys.right && g.fuel > 0) {
    car.vx += ENGINE_POWER;
    engineOn = true;
  }
  if (g.keys.left) {
    car.vx -= BRAKE_POWER;
  }

  // ---- Fuel consumption ----
  if (engineOn) {
    g.fuel = Math.max(0, g.fuel - FUEL_DRAIN);
    if (g.fuel === 0) endGame(g);

    // Spawn exhaust particle
    if (Math.random() < 0.4) {
      g.particles.push({
        x: car.x - 30 * Math.cos(car.angle),
        y: car.y + 30 * Math.sin(car.angle),
        vx: -1.5 - Math.random(),
        vy: -1 - Math.random() * 0.8,
        life: 1.0,
        size: 4 + Math.random() * 4,
      });
    }
  }

  // ---- Cap speed ----
  car.vx = Math.max(-MAX_SPEED * 0.5, Math.min(MAX_SPEED, car.vx));

  // ---- Gravity ----
  car.vy += GRAVITY;

  // ---- World X from cameraX + fixed screen X ----
  const worldX = g.cameraX + car.x;

  // ---- Wheel positions (world coordinates) ----
  const rearWorldX  = worldX - Math.cos(car.angle) * 30;
  const frontWorldX = worldX + Math.cos(car.angle) * 30;

  const rearGroundY  = getTerrainY(g, rearWorldX);
  const frontGroundY = getTerrainY(g, frontWorldX);

  // ---- Terrain angle at car position ----
  const terrainAngle = getTerrainAngle(g, worldX);

  // ---- Suspension spring physics ----
  // Each wheel tries to sit WHEEL_RADIUS above terrain
  function updateSuspension(susp, groundY, carWheelY) {
    const diff = carWheelY - (groundY - WHEEL_RADIUS);
    susp.vel += diff * SUSPENSION_K;
    susp.vel *= DAMPING;
    susp.offset += susp.vel;
  }

  const rearWheelY  = car.y + Math.sin(car.angle) * 30 + car.susp[0].offset;
  const frontWheelY = car.y - Math.sin(car.angle) * 30 + car.susp[1].offset;

  updateSuspension(car.susp[0], rearGroundY,  rearWheelY);
  updateSuspension(car.susp[1], frontGroundY, frontWheelY);

  // ---- Ground collision ----
  const avgGroundY  = (rearGroundY + frontGroundY) / 2;
  const carBottomY  = car.y + WHEEL_RADIUS + CAR_H / 2;

  car.onGround = false;

  if (carBottomY >= avgGroundY - 4) {
    // Car is on or below ground — resolve collision
    car.y = avgGroundY - WHEEL_RADIUS - CAR_H / 2;
    car.vy = Math.min(car.vy, 0) * -0.25; // bounce damping

    // Apply ground friction
    car.vx *= FRICTION;
    car.onGround = true;

    // Align car angle toward terrain slope
    const targetAngle = terrainAngle;
    car.angularVel += (targetAngle - car.angle) * 0.12;
    car.angularVel *= 0.6;

    // Torque from engine (wheelspin causes rotation)
    if (g.keys.right) car.angularVel += car.vx * 0.004;
    if (g.keys.left)  car.angularVel -= 0.01;

  } else {
    // In the air — air friction, torque from angular vel
    car.vx *= AIR_FRICTION;
    car.angularVel *= 0.94; // slow rotation in air
  }

  // ---- Apply angular velocity ----
  car.angle += car.angularVel;

  // ---- Flip detection ----
  // If car angle exceeds ±100° — it's flipped
  if (Math.abs(car.angle) > 1.75) {
    car.flipped = true;
    endGame(g);
  }

  // ---- Clamp angle ----
  car.angle = Math.max(-1.5, Math.min(1.5, car.angle));

  // ---- Move car horizontally (world scrolls) ----
  g.cameraX += car.vx;
  g.distance = Math.floor(g.cameraX / 5); // rough meter conversion

  // ---- Move particles ----
  for (let i = g.particles.length - 1; i >= 0; i--) {
    const p = g.particles[i];
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.04;
    p.life -= 0.035;
    if (p.life <= 0) g.particles.splice(i, 1);
  }

  // ---- Coin collection ----
  for (const coin of g.coinList) {
    if (coin.collected) continue;
    const screenCX = coin.wx - g.cameraX;
    const screenCY = coin.wy;
    const dx = car.x - screenCX;
    const dy = car.y - screenCY;
    if (Math.sqrt(dx * dx + dy * dy) < WHEEL_RADIUS + COIN_RADIUS + 10) {
      coin.collected = true;
      g.coins++;
    }
  }

  // ---- Trim offscreen coins ----
  while (g.coinList.length > 0 && g.coinList[0].wx < g.cameraX - 200) {
    g.coinList.shift();
  }

  // ---- Extend terrain when needed ----
  const lastIdx = g.terrainOffset + g.terrain.length;
  const neededIdx = Math.floor((g.cameraX + W * 2) / TERRAIN_SEGMENT);
  if (neededIdx > lastIdx - 100) extendTerrain(g);

  // ---- Trim old terrain to save memory ----
  const dropBefore = Math.floor((g.cameraX - 200) / TERRAIN_SEGMENT) - g.terrainOffset;
  if (dropBefore > 50) {
    g.terrain.splice(0, dropBefore);
    g.terrainOffset += dropBefore;
  }

  // ---- Spawn more coins ahead ----
  spawnCoins(g);
}

// =============================================================
//  RENDERING
// =============================================================

/**
 * Main render function — draws sky, terrain, coins, car, HUD.
 */
function render(g, time) {
  ctx.clearRect(0, 0, W, H);

  drawSky(g);
  drawClouds(g, time);
  drawTerrain(g);
  drawCoins(g, time);
  drawParticles(g);
  drawCar(g);
  updateHUD(g);
}

// ---- Sky gradient ----
function drawSky(g) {
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.7);
  skyGrad.addColorStop(0,   '#0d1b3e');
  skyGrad.addColorStop(0.5, '#1a3a6b');
  skyGrad.addColorStop(1,   '#2d6a9f');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);
}

// ---- Clouds (parallax scrolling) ----
const CLOUDS = [
  { x: 120, y: 60,  w: 120, h: 35, speed: 0.15 },
  { x: 350, y: 40,  w: 90,  h: 28, speed: 0.12 },
  { x: 600, y: 80,  w: 150, h: 42, speed: 0.18 },
  { x: 800, y: 55,  w: 100, h: 30, speed: 0.14 },
  { x: 1050, y: 70, w: 80,  h: 25, speed: 0.16 },
  { x: 1300, y: 45, w: 130, h: 38, speed: 0.13 },
];

function drawClouds(g, time) {
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  for (const c of CLOUDS) {
    const screenX = ((c.x - g.cameraX * c.speed) % (W + 300) + W + 300) % (W + 300) - 150;
    drawCloud(screenX, c.y, c.w, c.h);
  }
}

function drawCloud(x, y, w, h) {
  ctx.beginPath();
  ctx.ellipse(x, y, w / 2, h / 2, 0, 0, Math.PI * 2);
  ctx.ellipse(x - w * 0.3, y + h * 0.1, w * 0.35, h * 0.45, 0, 0, Math.PI * 2);
  ctx.ellipse(x + w * 0.3, y + h * 0.1, w * 0.32, h * 0.42, 0, 0, Math.PI * 2);
  ctx.fill();
}

// ---- Terrain ----
function drawTerrain(g) {
  if (g.terrain.length === 0) return;

  // How many screen pixels each segment covers
  const step = TERRAIN_SEGMENT;

  // Starting segment index visible on screen
  const startIdx = Math.floor(g.cameraX / step) - g.terrainOffset;
  const endIdx   = startIdx + Math.ceil(W / step) + 2;

  // ---- Ground fill (multi-layer) ----
  // Top soil layer
  ctx.beginPath();
  ctx.moveTo(-10, H + 10);

  for (let i = Math.max(0, startIdx); i < Math.min(endIdx, g.terrain.length); i++) {
    const screenX = (i + g.terrainOffset) * step - g.cameraX;
    ctx.lineTo(screenX, g.terrain[i]);
  }

  ctx.lineTo(W + 10, H + 10);
  ctx.closePath();

  const groundGrad = ctx.createLinearGradient(0, H * 0.4, 0, H);
  groundGrad.addColorStop(0,   '#4a8c3f');
  groundGrad.addColorStop(0.08,'#5aa64d');
  groundGrad.addColorStop(0.12,'#7a4f2e');
  groundGrad.addColorStop(1,   '#5a3820');
  ctx.fillStyle = groundGrad;
  ctx.fill();

  // ---- Grass top edge highlight ----
  ctx.beginPath();
  ctx.moveTo(-10, H);

  for (let i = Math.max(0, startIdx); i < Math.min(endIdx, g.terrain.length); i++) {
    const screenX = (i + g.terrainOffset) * step - g.cameraX;
    ctx.lineTo(screenX, g.terrain[i]);
  }

  ctx.strokeStyle = '#6ecf5f';
  ctx.lineWidth = 3;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // ---- Rock layer (slightly below surface) ----
  ctx.beginPath();
  ctx.moveTo(-10, H + 10);

  for (let i = Math.max(0, startIdx); i < Math.min(endIdx, g.terrain.length); i++) {
    const screenX = (i + g.terrainOffset) * step - g.cameraX;
    ctx.lineTo(screenX, g.terrain[i] + 22);
  }

  ctx.lineTo(W + 10, H + 10);
  ctx.closePath();
  ctx.fillStyle = '#7a5a3a';
  ctx.fill();
}

// ---- Coins ----
function drawCoins(g, time) {
  for (const coin of g.coinList) {
    if (coin.collected) continue;
    const sx = coin.wx - g.cameraX;
    if (sx < -40 || sx > W + 40) continue;

    // Bob animation
    const bobY = coin.wy + Math.sin(time * 0.002 + coin.bobPhase) * 5;

    // Outer glow ring
    ctx.beginPath();
    ctx.arc(sx, bobY, COIN_RADIUS + 3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,210,0,0.2)';
    ctx.fill();

    // Coin body
    const cGrad = ctx.createRadialGradient(sx - 3, bobY - 3, 1, sx, bobY, COIN_RADIUS);
    cGrad.addColorStop(0, '#fff176');
    cGrad.addColorStop(0.5, '#ffd200');
    cGrad.addColorStop(1, '#f7971e');
    ctx.beginPath();
    ctx.arc(sx, bobY, COIN_RADIUS, 0, Math.PI * 2);
    ctx.fillStyle = cGrad;
    ctx.fill();

    // Dollar sign
    ctx.fillStyle = 'rgba(120,70,0,0.7)';
    ctx.font = 'bold 13px Segoe UI';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('$', sx, bobY + 1);
  }
}

// ---- Exhaust Particles ----
function drawParticles(g) {
  for (const p of g.particles) {
    ctx.save();
    ctx.globalAlpha = p.life * 0.6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(180,160,100,${p.life * 0.8})`;
    ctx.fill();
    ctx.restore();
  }
}

// ---- Car ----
function drawCar(g) {
  const car = g.car;
  ctx.save();
  ctx.translate(car.x, car.y);
  ctx.rotate(car.angle);

  // ---- Body shadow ----
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(0, CAR_H / 2 + 6, CAR_W * 0.5, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // ---- Main body ----
  ctx.fillStyle = '#2563eb';   // blue body
  ctx.beginPath();
  ctx.roundRect(-CAR_W / 2, -CAR_H / 2, CAR_W, CAR_H, 6);
  ctx.fill();

  // ---- Cab (top) ----
  ctx.fillStyle = '#1d4ed8';
  ctx.beginPath();
  ctx.roundRect(-CAR_W / 2 + 10, -CAR_H / 2 - 20, CAR_W - 20, 22, [6, 6, 0, 0]);
  ctx.fill();

  // ---- Windshield ----
  ctx.fillStyle = 'rgba(150,220,255,0.7)';
  ctx.beginPath();
  ctx.roundRect(-CAR_W / 2 + 14, -CAR_H / 2 - 18, CAR_W - 38, 18, 4);
  ctx.fill();

  // ---- Body highlight ----
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.roundRect(-CAR_W / 2 + 2, -CAR_H / 2 + 2, CAR_W - 4, CAR_H / 3, 4);
  ctx.fill();

  // ---- Headlights ----
  ctx.fillStyle = '#fef08a';
  ctx.beginPath();
  ctx.ellipse(CAR_W / 2 - 4, -4, 5, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // ---- Taillights ----
  ctx.fillStyle = '#f87171';
  ctx.beginPath();
  ctx.ellipse(-CAR_W / 2 + 4, -4, 5, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // ---- Wheels (with suspension offsets) ----
  drawWheel(ctx,  22, CAR_H / 2 + car.susp[1].offset);  // front wheel
  drawWheel(ctx, -22, CAR_H / 2 + car.susp[0].offset);  // rear wheel

  ctx.restore();
}

/**
 * Draw a single wheel at local coordinates (cx, cy).
 */
function drawWheel(ctx, cx, cy) {
  // Tire
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.arc(cx, cy, WHEEL_RADIUS, 0, Math.PI * 2);
  ctx.fill();

  // Tire tread
  ctx.strokeStyle = '#2d2d4e';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.arc(cx, cy, WHEEL_RADIUS - 2, 0, Math.PI * 2);
  ctx.stroke();

  // Hub
  ctx.fillStyle = '#94a3b8';
  ctx.beginPath();
  ctx.arc(cx, cy, 5, 0, Math.PI * 2);
  ctx.fill();

  // Spokes
  ctx.strokeStyle = '#64748b';
  ctx.lineWidth = 1.5;
  for (let s = 0; s < 4; s++) {
    const a = (s / 4) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(a) * (WHEEL_RADIUS - 3), cy + Math.sin(a) * (WHEEL_RADIUS - 3));
    ctx.stroke();
  }
}

// ---- HUD update ----
function updateHUD(g) {
  // Fuel bar
  const fuelPct = Math.max(0, g.fuel);
  fuelBar.style.width = fuelPct + '%';
  if (fuelPct < 20) {
    fuelBar.style.background = 'linear-gradient(90deg, #ef4444, #f97316)';
  } else if (fuelPct < 50) {
    fuelBar.style.background = 'linear-gradient(90deg, #f97316, #fbbf24)';
  } else {
    fuelBar.style.background = 'linear-gradient(90deg, #f7971e, #ffd200)';
  }

  // Distance
  distDisplay.innerHTML = `${g.distance} <span>m</span>`;

  // Coins
  document.getElementById('coinCount').textContent = g.coins;
}

// =============================================================
//  GAME LOOP
// =============================================================

let lastTime = 0;

/**
 * Main loop — called every frame via requestAnimationFrame.
 */
function gameLoop(timestamp) {
  if (!game.running) return;

  const dt = Math.min(timestamp - lastTime, 32); // cap dt to avoid spiral
  lastTime = timestamp;

  updatePhysics(game, dt);
  render(game, timestamp);

  game.frameId = requestAnimationFrame(gameLoop);
}

// =============================================================
//  GAME OVER & RESTART
// =============================================================

function endGame(g) {
  if (!g.running) return;
  g.running = false;
  cancelAnimationFrame(g.frameId);

  // Show game over screen
  finalDist.textContent  = g.distance + ' m';
  finalCoins.textContent = g.coins;
  gameOverEl.classList.add('visible');
}

function restartGame() {
  // Cancel any existing loop
  if (game && game.frameId) cancelAnimationFrame(game.frameId);

  // Hide game over screen
  gameOverEl.classList.remove('visible');

  // Create fresh state
  game = createGameState();
  spawnCoins(game);

  // Start loop
  lastTime = performance.now();
  game.frameId = requestAnimationFrame(gameLoop);
}

// =============================================================
//  INPUT HANDLING
// =============================================================

document.addEventListener('keydown', (e) => {
  if (!game) return;

  switch (e.code) {
    case 'ArrowRight': game.keys.right = true;  e.preventDefault(); break;
    case 'ArrowLeft':  game.keys.left  = true;  e.preventDefault(); break;
    case 'Space':
      e.preventDefault();
      restartGame();
      break;
  }
});

document.addEventListener('keyup', (e) => {
  if (!game) return;
  switch (e.code) {
    case 'ArrowRight': game.keys.right = false; break;
    case 'ArrowLeft':  game.keys.left  = false; break;
  }
});

// ===== Touch support (mobile) =====
let touchLeft = false, touchRight = false;

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.clientX > canvas.getBoundingClientRect().left + W / 2) touchRight = true;
    else touchLeft = true;
  }
  if (game) { game.keys.right = touchRight; game.keys.left = touchLeft; }
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  touchLeft = false; touchRight = false;
  if (game) { game.keys.right = false; game.keys.left = false; }
}, { passive: false });

// =============================================================
//  BOOT
// =============================================================

// Check if roundRect is available (some older browsers lack it)
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    const rr = Array.isArray(r) ? r : [r, r, r, r];
    this.beginPath();
    this.moveTo(x + rr[0], y);
    this.lineTo(x + w - rr[1], y);
    this.quadraticCurveTo(x + w, y, x + w, y + rr[1]);
    this.lineTo(x + w, y + h - rr[2]);
    this.quadraticCurveTo(x + w, y + h, x + w - rr[2], y + h);
    this.lineTo(x + rr[3], y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - rr[3]);
    this.lineTo(x, y + rr[0]);
    this.quadraticCurveTo(x, y, x + rr[0], y);
    this.closePath();
    return this;
  };
}

// Start the game!
restartGame();
</script>
